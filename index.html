<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProspectPro — Fundraising Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --blue: #1a56db;
  --blue-light: #e1effe;
  --blue-dark: #1e40af;
  --green: #059669;
  --green-light: #d1fae5;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --indigo: #4f46e5;
  --indigo-light: #e0e7ff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --sidebar-w: 240px;
  --header-h: 56px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--gray-50); color: var(--gray-800); font-size: 14px; line-height: 1.5; }
a { color: var(--blue); text-decoration: none; }
button { cursor: pointer; font-family: inherit; font-size: 14px; border: none; border-radius: 6px; padding: 8px 16px; transition: all .15s; }
button:hover { opacity: 0.9; }
input, select, textarea { font-family: inherit; font-size: 14px; border: 1px solid var(--gray-300); border-radius: 6px; padding: 8px 12px; outline: none; transition: border-color .15s; width: 100%; }
input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,219,.1); }
textarea { resize: vertical; min-height: 80px; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--gray-50); font-weight: 600; text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--gray-200); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-500); white-space: nowrap; user-select: none; cursor: pointer; }
th:hover { color: var(--gray-700); }
td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); }
tr:hover td { background: var(--gray-50); }
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue-dark); }
.btn-success { background: var(--green); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-warning { background: var(--amber); color: #fff; }
.btn-outline { background: #fff; color: var(--gray-700); border: 1px solid var(--gray-300); }
.btn-outline:hover { background: var(--gray-50); border-color: var(--gray-400); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Layout */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
  background: var(--gray-900); color: #fff; z-index: 100;
  display: flex; flex-direction: column; transition: transform .2s;
}
#sidebar .logo { padding: 16px 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; gap: 10px; }
#sidebar .logo span { color: var(--blue-light); }
#sidebar nav { flex: 1; padding: 12px 0; overflow-y: auto; }
#sidebar nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; color: var(--gray-400);
  font-size: 14px; font-weight: 500; transition: all .15s;
  position: relative; text-decoration: none;
}
#sidebar nav a:hover { color: #fff; background: rgba(255,255,255,.05); }
#sidebar nav a.active { color: #fff; background: rgba(255,255,255,.1); }
#sidebar nav a.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--blue); border-radius: 0 3px 3px 0; }
#sidebar nav a .nav-icon { width: 20px; text-align: center; font-size: 16px; }
#sidebar nav a .badge-count {
  margin-left: auto; background: var(--red); color: #fff;
  font-size: 11px; font-weight: 600; padding: 1px 6px;
  border-radius: 10px; min-width: 18px; text-align: center;
}
#sidebar .security-badge {
  margin: 12px 16px; padding: 10px 12px; background: rgba(5,150,105,.15);
  border-radius: 8px; border: 1px solid rgba(5,150,105,.3);
  font-size: 11px; color: #a7f3d0;
}
#sidebar .security-badge strong { display: block; color: #6ee7b7; margin-bottom: 2px; font-size: 12px; }
.menu-toggle {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  background: var(--gray-800); color: #fff; width: 36px; height: 36px;
  border-radius: 8px; font-size: 20px; align-items: center; justify-content: center; border: none;
}

#main { margin-left: var(--sidebar-w); min-height: 100vh; }
#header {
  height: var(--header-h); background: #fff; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; position: sticky; top: 0; z-index: 50;
}
#header h1 { font-size: 18px; font-weight: 600; color: var(--gray-800); }
#header .header-actions { display: flex; align-items: center; gap: 8px; }
#content { padding: 24px; }

.card { background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-header h2 { font-size: 16px; font-weight: 600; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; padding: 16px 20px; }
.stat-card .stat-label { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; color: var(--gray-800); margin-top: 4px; }
.stat-card .stat-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

.score-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 50%;
  font-weight: 700; font-size: 13px; color: #fff;
}
.score-badge.score-high { background: var(--green); }
.score-badge.score-mid { background: var(--amber); }
.score-badge.score-low { background: var(--gray-400); }
.score-badge-sm { width: 28px; height: 28px; font-size: 11px; }

.stage-badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600; white-space: nowrap;
}
.stage-prospect { background: var(--indigo-light); color: var(--indigo); }
.stage-cultivate { background: var(--amber-light); color: var(--amber); }
.stage-solicit { background: var(--green-light); color: var(--green); }
.stage-steward { background: var(--purple-light); color: var(--purple); }

.alert-card {
  padding: 12px 16px; border-radius: 8px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: transform .1s;
}
.alert-card:hover { transform: translateX(4px); }
.alert-critical { background: var(--red-light); border-left: 4px solid var(--red); }
.alert-warning { background: var(--amber-light); border-left: 4px solid var(--amber); }
.alert-info { background: var(--blue-light); border-left: 4px solid var(--blue); }

.kanban { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; min-height: 400px; }
.kanban-col { background: var(--gray-100); border-radius: 10px; padding: 12px; }
.kanban-col-header { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 8px 4px; display: flex; justify-content: space-between; align-items: center; }
.kanban-col-header .count { background: rgba(0,0,0,.1); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.kanban-card {
  background: #fff; border: 1px solid var(--gray-200); border-radius: 8px;
  padding: 12px; margin-top: 8px; cursor: pointer; transition: box-shadow .15s;
}
.kanban-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.kanban-card .kc-name { font-weight: 600; font-size: 14px; }
.kanban-card .kc-occ { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.kanban-card .kc-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.kanban-card .kc-pledge { font-size: 13px; font-weight: 600; color: var(--green); }
.kanban-card .kc-actions { display: flex; gap: 4px; margin-top: 8px; }
.kanban-card .kc-actions button { padding: 3px 8px; font-size: 11px; }

.drop-zone {
  border: 2px dashed var(--gray-300); border-radius: 12px; padding: 48px 24px;
  text-align: center; cursor: pointer; transition: all .2s; background: var(--gray-50);
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--blue); background: var(--blue-light); }
.drop-zone .dz-icon { font-size: 48px; margin-bottom: 12px; }
.drop-zone .dz-text { font-size: 16px; font-weight: 600; color: var(--gray-700); }
.drop-zone .dz-sub { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

.mapping-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
.mapping-grid .arrow { color: var(--gray-400); font-size: 18px; text-align: center; }
.mapping-grid label { font-weight: 600; font-size: 13px; color: var(--gray-600); padding: 4px 0; }

.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 500; display: flex;
  align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: #fff; border-radius: 12px; width: 100%; max-width: 720px;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-header { padding: 16px 24px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 18px; font-weight: 600; }
.modal-close { background: none; font-size: 24px; color: var(--gray-400); padding: 4px; border: none; }
.modal-close:hover { color: var(--gray-700); }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 8px; }

.tabs { display: flex; border-bottom: 2px solid var(--gray-200); margin-bottom: 16px; }
.tab-btn { padding: 10px 20px; font-weight: 600; color: var(--gray-500); background: none; border-radius: 0; position: relative; border: none; }
.tab-btn:hover { color: var(--gray-700); }
.tab-btn.active { color: var(--blue); }
.tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--blue); }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.slider-group { margin-bottom: 16px; }
.slider-group label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; }
.slider-group input[type="range"] { width: 100%; padding: 0; border: none; height: 6px; -webkit-appearance: none; appearance: none; background: var(--gray-200); border-radius: 3px; outline: none; }
.slider-group input[type="range"]:focus { box-shadow: none; }
.slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--blue); cursor: pointer; }
.slider-group input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--blue); cursor: pointer; border: none; }

.outreach-content { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 8px; padding: 16px; white-space: pre-wrap; font-size: 13px; line-height: 1.7; max-height: 400px; overflow-y: auto; }

.bar-chart { margin-top: 12px; }
.bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
.bar-label { width: 110px; font-size: 12px; font-weight: 600; color: var(--gray-600); text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; height: 20px; background: var(--gray-100); border-radius: 4px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .3s; display: flex; align-items: center; padding-left: 6px; font-size: 10px; font-weight: 700; color: #fff; min-width: 24px; }
.bar-value { width: 36px; font-size: 12px; font-weight: 600; color: var(--gray-700); flex-shrink: 0; }

.search-bar { position: relative; }
.search-bar input { padding-left: 36px; }
.search-bar .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--gray-400); pointer-events: none; }

.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--gray-800);
  color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px;
  z-index: 1000; box-shadow: 0 4px 12px rgba(0,0,0,.2);
  animation: slideIn .3s ease;
}
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

@media(max-width:900px){
  .kanban { grid-template-columns: 1fr 1fr; }
}
@media(max-width:768px){
  .menu-toggle { display: flex; }
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  .kanban { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}
@media(max-width:480px){
  .stat-grid { grid-template-columns: 1fr; }
}
.hidden { display: none !important; }
.text-muted { color: var(--gray-500); }
.text-sm { font-size: 12px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }

/* Chatbot */
#chatbot-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 400;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 24px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(26,86,219,.4); cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
#chatbot-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(26,86,219,.5); }
#chatbot-panel {
  position: fixed; bottom: 88px; right: 24px; z-index: 400;
  width: 380px; max-height: 520px; background: #fff;
  border-radius: 16px; border: 1px solid var(--gray-200);
  box-shadow: 0 12px 40px rgba(0,0,0,.15);
  display: flex; flex-direction: column;
  transition: opacity .2s, transform .2s;
}
#chatbot-panel.hidden { opacity: 0; transform: translateY(12px); pointer-events: none; display: flex !important; }
#chatbot-panel .chat-header {
  padding: 14px 18px; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between;
  border-radius: 16px 16px 0 0; background: var(--gray-50);
}
#chatbot-panel .chat-header h3 { font-size: 14px; font-weight: 700; color: var(--gray-800); }
#chatbot-panel .chat-header .chat-close { background: none; border: none; font-size: 18px; color: var(--gray-400); cursor: pointer; padding: 2px; }
#chat-messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px;
  min-height: 200px; max-height: 360px;
}
.chat-msg {
  max-width: 88%; padding: 10px 14px; border-radius: 14px;
  font-size: 13px; line-height: 1.5; word-wrap: break-word;
}
.chat-msg.bot { background: var(--gray-100); color: var(--gray-800); align-self: flex-start; border-bottom-left-radius: 4px; }
.chat-msg.user { background: var(--blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.chat-msg a { color: inherit; text-decoration: underline; cursor: pointer; }
.chat-msg .chat-action { display: inline-block; margin-top: 6px; padding: 3px 10px; background: rgba(0,0,0,.08); border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
.chat-msg .chat-action:hover { background: rgba(0,0,0,.15); }
#chat-input-area {
  padding: 12px 14px; border-top: 1px solid var(--gray-200);
  display: flex; gap: 8px; align-items: center;
}
#chat-input-area input {
  flex: 1; border: 1px solid var(--gray-200); border-radius: 20px;
  padding: 8px 14px; font-size: 13px; outline: none;
}
#chat-input-area input:focus { border-color: var(--blue); }
#chat-input-area button {
  width: 34px; height: 34px; border-radius: 50%; background: var(--blue);
  color: #fff; border: none; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chat-suggestions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.chat-suggestions span {
  padding: 3px 8px; background: var(--blue-light); color: var(--blue);
  border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer;
}
.chat-suggestions span:hover { background: var(--blue); color: #fff; }

/* Custom weight row */
.weight-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--gray-100);
}
.weight-row .wr-name { flex: 1; font-weight: 600; font-size: 13px; color: var(--gray-700); }
.weight-row .wr-val { width: 36px; text-align: center; font-weight: 700; font-size: 13px; color: var(--blue); }
.weight-row input[type="range"] { width: 160px; padding: 0; border: none; height: 6px; -webkit-appearance: none; appearance: none; background: var(--gray-200); border-radius: 3px; outline: none; }
.weight-row input[type="range"]:focus { box-shadow: none; }
.weight-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--blue); cursor: pointer; }
.weight-row input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--blue); cursor: pointer; border: none; }
.weight-row .wr-delete { background: none; border: none; color: var(--gray-400); font-size: 16px; cursor: pointer; padding: 2px 4px; }
.weight-row .wr-delete:hover { color: var(--red); }
.weight-row .wr-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--indigo-light); color: var(--indigo); font-weight: 600; }

@media(max-width:480px){
  #chatbot-panel { width: calc(100vw - 32px); right: 16px; bottom: 80px; }
}

/* Theme swatches */
.theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.theme-swatch {
  border: 2px solid var(--gray-200); border-radius: 10px; padding: 12px; cursor: pointer;
  transition: all .15s; text-align: center;
}
.theme-swatch:hover { border-color: var(--gray-400); transform: translateY(-2px); }
.theme-swatch.active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,219,.15); }
.theme-swatch .swatch-colors { display: flex; gap: 3px; margin-bottom: 8px; border-radius: 6px; overflow: hidden; height: 32px; }
.theme-swatch .swatch-colors div { flex: 1; }
.theme-swatch .swatch-name { font-size: 12px; font-weight: 600; color: var(--gray-700); }

/* Settings sections */
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid var(--gray-100);
}
.setting-row:last-child { border-bottom: none; }
.setting-row .sr-label { font-weight: 600; font-size: 13px; color: var(--gray-700); }
.setting-row .sr-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.setting-row select, .setting-row input { width: auto; min-width: 160px; }
.toggle-switch {
  position: relative; width: 44px; height: 24px; background: var(--gray-300);
  border-radius: 12px; cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.toggle-switch.on { background: var(--blue); }
.toggle-switch::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; border-radius: 50%; background: #fff;
  transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle-switch.on::after { transform: translateX(20px); }

/* Activity log */
.activity-entry { padding: 12px; background: var(--gray-50); border: 1px solid var(--gray-100); border-radius: 8px; margin-bottom: 8px; }
.activity-entry .ae-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.activity-type-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.activity-type-badge.at-call { background: var(--blue-light); color: var(--blue); }
.activity-type-badge.at-email { background: var(--green-light); color: var(--green); }
.activity-type-badge.at-meeting { background: var(--purple-light); color: var(--purple); }
.activity-type-badge.at-note { background: var(--gray-200); color: var(--gray-600); }
.activity-type-badge.at-gift { background: var(--amber-light); color: var(--amber); }
.activity-type-badge.at-other { background: var(--gray-100); color: var(--gray-500); }
.outcome-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.outcome-badge.ob-positive { background: var(--green-light); color: var(--green); }
.outcome-badge.ob-neutral { background: var(--gray-200); color: var(--gray-600); }
.outcome-badge.ob-negative { background: var(--red-light); color: var(--red); }
.outcome-badge.ob-pending { background: var(--amber-light); color: var(--amber); }
.log-count-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; background: var(--blue-light); color: var(--blue); margin-left: 4px; }

/* Filter bar */

<script>
(function() {
"use strict";

// ===== STATE =====
var prospects = [];
var nextId = 1;
var currentPage = 'dashboard';
var sortCol = 'score';
var sortDir = -1;
var searchTerm = '';

// Each factor uses a 1–25 scale. No fixed budget — weights are relative.
var weights = { homeValue: 18, salary: 13, pledge: 18, lifetime: 18, recency: 13, engagement: 10 };
var defaultWeights = { homeValue: 18, salary: 13, pledge: 18, lifetime: 18, recency: 13, engagement: 10 };

// Custom weights: user-defined numeric factors from Excel columns
var customWeights = [];

// Fundraiser Profile — used to personalize all outreach
var profile = {
  name: '', title: '', orgName: '', orgMission: '',
  phone: '', email: '', signature: '',
  upcomingEvent: '', eventDate: '',
  newsletterUpdate: '',
  talkingPoints: [],
  tone: 'warm-professional',
  campaignName: ''
};

// Theme & App Settings
var THEMES = [
  { id: 'default', name: 'Ocean Blue', primary: '#1a56db', dark: '#1e40af', sidebar: '#111827', accent: '#059669' },
  { id: 'forest', name: 'Forest Green', primary: '#059669', dark: '#047857', sidebar: '#064e3b', accent: '#0d9488' },
  { id: 'crimson', name: 'University Red', primary: '#dc2626', dark: '#b91c1c', sidebar: '#1c1917', accent: '#ea580c' },
  { id: 'purple', name: 'Foundation Purple', primary: '#7c3aed', dark: '#6d28d9', sidebar: '#1e1b4b', accent: '#a855f7' },
  { id: 'gold', name: 'Nonprofit Gold', primary: '#b45309', dark: '#92400e', sidebar: '#1c1917', accent: '#d97706' },
  { id: 'teal', name: 'Health & Wellness', primary: '#0d9488', dark: '#0f766e', sidebar: '#134e4a', accent: '#06b6d4' },
  { id: 'slate', name: 'Corporate Gray', primary: '#475569', dark: '#334155', sidebar: '#0f172a', accent: '#6366f1' },
  { id: 'rose', name: 'Arts & Culture', primary: '#e11d48', dark: '#be123c', sidebar: '#1a1a2e', accent: '#f43f5e' }
];
var currentTheme = 'default';
var appSettings = {
  defaultStage: 'Prospect',
  showScoreOnCards: true,
  compactTables: false,
  alertThresholdCritical: 180,
  alertThresholdWarning: 90
};

// Filter state (session only — not persisted)
var filters = {
  stages: [], // empty = all
  scoreMin: 0,
  scoreMax: 100,
  engagements: [], // empty = all
  contactRange: 'any' // 'any','30','31-90','91-180','180+'
};
function resetFilters() {
  filters.stages = []; filters.scoreMin = 0; filters.scoreMax = 100;
  filters.engagements = []; filters.contactRange = 'any';
}
function activeFilterCount() {
  var c = 0;
  if (filters.stages.length > 0) c++;
  if (filters.scoreMin > 0 || filters.scoreMax < 100) c++;
  if (filters.engagements.length > 0) c++;
  if (filters.contactRange !== 'any') c++;
  return c;
}
var filtersOpen = false;

// ===== localStorage PERSISTENCE =====
var STORAGE_KEY = 'prospectpro_state';
var saveTimer = null;
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    try {
      var state = {
        prospects: prospects.map(function(p) {
          var copy = {};
          Object.keys(p).forEach(function(k) { copy[k] = p[k]; });
          if (p.lastContact instanceof Date) copy.lastContact = p.lastContact.toISOString();
          if (p.activityLog) copy.activityLog = p.activityLog.map(function(e) {
            var ec = {}; Object.keys(e).forEach(function(k) { ec[k] = e[k]; }); return ec;
          });
          return copy;
        }),
        nextId: nextId,
        profile: profile,
        weights: weights,
        customWeights: customWeights,
        appSettings: appSettings,
        currentTheme: currentTheme
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch(e) { /* storage full or unavailable — silent */ }
  }, 300);
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    var state = JSON.parse(raw);
    if (state.prospects && state.prospects.length > 0) {
      prospects = state.prospects.map(function(p) {
        if (p.lastContact && typeof p.lastContact === 'string') p.lastContact = new Date(p.lastContact);
        if (!p.activityLog) p.activityLog = [];
        if (!p.nextAction) p.nextAction = '';
        if (!p.nextActionDate) p.nextActionDate = '';
        if (!p.targetAskAmount) p.targetAskAmount = 0;
        if (!p.customData) p.customData = {};
        return p;
      });
      nextId = state.nextId || (Math.max.apply(null, prospects.map(function(p) { return p.id; })) + 1);
    }
    if (state.profile) {
      Object.keys(state.profile).forEach(function(k) { profile[k] = state.profile[k]; });
      if (!profile.talkingPoints) profile.talkingPoints = [];
    }
    if (state.weights) Object.keys(state.weights).forEach(function(k) { weights[k] = state.weights[k]; });
    if (state.customWeights) customWeights = state.customWeights;
    if (state.appSettings) Object.keys(state.appSettings).forEach(function(k) { appSettings[k] = state.appSettings[k]; });
    if (state.currentTheme) currentTheme = state.currentTheme;
    rescoreAll();
    return true;
  } catch(e) { return false; }
}

function clearSavedData() {
  if (confirm('Clear ALL saved data? This removes everything from your browser and cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

// Derive lastContact from activityLog
function effectiveLastContact(p) {
  if (p.activityLog && p.activityLog.length > 0) {
    var sorted = p.activityLog.slice().sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
    return new Date(sorted[0].date);
  }
  return p.lastContact;
}

function applyTheme(themeId) {
  var theme = THEMES.find(function(t) { return t.id === themeId; }) || THEMES[0];
  currentTheme = theme.id;
  var root = document.documentElement;
  root.style.setProperty('--blue', theme.primary);
  root.style.setProperty('--blue-dark', theme.dark);
  root.style.setProperty('--gray-900', theme.sidebar);
  var r = parseInt(theme.primary.slice(1,3),16), g = parseInt(theme.primary.slice(3,5),16), b = parseInt(theme.primary.slice(5,7),16);
  root.style.setProperty('--blue-light', 'rgba('+r+','+g+','+b+',0.08)');
  document.getElementById('sidebar').style.background = theme.sidebar;
}

var STAGES = ['Prospect', 'Cultivate', 'Solicit', 'Steward'];
var STAGE_CLASSES = { Prospect: 'stage-prospect', Cultivate: 'stage-cultivate', Solicit: 'stage-solicit', Steward: 'stage-steward' };

var salaryLookup = {
  'ceo': 250000, 'chief executive': 250000, 'president': 200000,
  'physician': 300000, 'surgeon': 300000, 'doctor': 300000, 'md': 300000,
  'attorney': 160000, 'lawyer': 160000, 'partner': 200000,
  'vp': 180000, 'vice president': 180000,
  'director': 150000, 'senior director': 170000,
  'engineer': 120000, 'software engineer': 130000, 'developer': 120000,
  'professor': 100000, 'teacher': 65000,
  'consultant': 110000, 'analyst': 80000, 'manager': 95000,
  'nurse': 75000, 'pharmacist': 120000, 'dentist': 180000,
  'architect': 100000, 'accountant': 80000, 'cpa': 90000,
  'realtor': 85000, 'real estate': 85000,
  'retired': 60000, 'student': 30000, 'nonprofit': 65000,
  'executive': 200000, 'founder': 200000, 'entrepreneur': 150000,
  'cfo': 220000, 'cto': 220000, 'coo': 210000,
  'investment banker': 250000, 'banker': 130000, 'finance': 120000,
  'pilot': 130000, 'sales': 90000
};

// ===== HELPERS =====
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function h(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === 'className') e.className = attrs[k];
      else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
      else if (k.startsWith('on') && typeof attrs[k] === 'function') {
        e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      }
      else if (k === 'htmlFor') e.setAttribute('for', attrs[k]);
      else e.setAttribute(k, attrs[k]);
    });
  }
  if (children !== undefined && children !== null) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(function(c) {
      if (c == null || c === false) return;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    });
  }
  return e;
}

function fmt$(v) {
  if (v == null || isNaN(v) || v === 0) return '$0';
  return '$' + Math.round(Number(v)).toLocaleString('en-US');
}
function fmtDate(d) {
  if (!d) return '\u2014';
  var dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt.getTime())) return '\u2014';
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
}
function daysSince(d) {
  if (!d) return 999;
  var dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt.getTime())) return 999;
  return Math.floor((Date.now() - dt.getTime()) / 86400000);
}
function estimateSalary(occ) {
  if (!occ) return 75000;
  var lower = occ.toLowerCase();
  var keys = Object.keys(salaryLookup);
  for (var i = 0; i < keys.length; i++) {
    if (lower.indexOf(keys[i]) !== -1) return salaryLookup[keys[i]];
  }
  return 75000;
}
function scoreClass(s) { return s >= 70 ? 'score-high' : s >= 40 ? 'score-mid' : 'score-low'; }
function stageClass(st) { return STAGE_CLASSES[st] || 'stage-prospect'; }

function toast(msg) {
  var t = h('div', { className: 'toast' }, [msg]);
  $('#toast-root').appendChild(t);
  setTimeout(function() { if (t.parentNode) t.remove(); }, 3000);
}

// ===== WEIGHT HELPERS =====
function getTotalWeight() {
  var sum = 0;
  Object.keys(weights).forEach(function(k) { sum += weights[k]; });
  customWeights.forEach(function(cw) { sum += cw.weight; });
  return sum;
}

// ===== SCORING =====
function scoreProspect(p) {
  var f = {};
  f.homeValue = Math.min(100, ((p.homeValue || 0) / 2000000) * 100);
  f.salary = Math.min(100, ((p.salary || 0) / 300000) * 100);
  f.pledge = Math.min(100, ((p.pledge || 0) / 100000) * 100);
  f.lifetime = Math.min(100, ((p.lifetime || 0) / 500000) * 100);
  var ds = daysSince(effectiveLastContact(p));
  f.recency = Math.max(0, 100 - (ds / 365 * 100));
  var engMap = { high: 100, medium: 60, low: 30, unknown: 20 };
  f.engagement = engMap[(p.engagement || 'unknown').toLowerCase()] || 20;

  var tw = 0;
  Object.keys(weights).forEach(function(k) { tw += weights[k]; });
  var weightedSum = f.homeValue * weights.homeValue + f.salary * weights.salary + f.pledge * weights.pledge +
    f.lifetime * weights.lifetime + f.recency * weights.recency + f.engagement * weights.engagement;

  // Include custom weights
  customWeights.forEach(function(cw) {
    var rawVal = p.customData && p.customData[cw.key] != null ? p.customData[cw.key] : 0;
    var normalized = cw.maxVal > 0 ? Math.min(100, (rawVal / cw.maxVal) * 100) : 0;
    f[cw.key] = normalized;
    weightedSum += normalized * cw.weight;
    tw += cw.weight;
  });

  if (tw === 0) tw = 1;
  p.score = Math.round(weightedSum / tw);
  p.factors = f;
  return p.score;
}
function rescoreAll() { prospects.forEach(scoreProspect); }

// ===== PROFILE HELPERS =====
function pName() { return profile.name || 'Your Name'; }
function pTitle() { return profile.title || 'Development Officer'; }
function pOrg() { return profile.orgName || 'Our Organization'; }
function pMission() { return profile.orgMission || 'our mission'; }
function pPhone() { return profile.phone || '(555) 000-0000'; }
function pEmail() { return profile.email || 'your.email@org.com'; }
function pSig() { return profile.signature || pName() + '\n' + pTitle() + '\n' + pPhone() + ' | ' + pEmail(); }
function pEvent() { return profile.upcomingEvent; }
function pEventDate() { return profile.eventDate; }
function pNewsletter() { return profile.newsletterUpdate; }
function pTone() { return profile.tone || 'warm-professional'; }
function pCampaign() { return profile.campaignName; }
function pTalkingPt() {
  if (profile.talkingPoints.length === 0) return '';
  return profile.talkingPoints[Math.floor(Math.random() * profile.talkingPoints.length)];
}

// Tone modifiers
function toneGreet(fn) {
  if (pTone() === 'formal') return 'Dear ' + fn + ',';
  if (pTone() === 'casual') return 'Hi ' + fn + '!';
  return 'Dear ' + fn + ',';
}
function toneClose() {
  if (pTone() === 'formal') return 'Respectfully,';
  if (pTone() === 'casual') return 'Best,';
  return 'Warm regards,';
}
function tonePhoneOpen(fn) {
  if (pTone() === 'formal') return '"Good morning/afternoon, ' + fn + '. This is ' + pName() + ' with ' + pOrg() + '. I hope I\'m not interrupting. Do you have a moment?"';
  if (pTone() === 'casual') return '"Hey ' + fn + '! It\'s ' + pName() + ' from ' + pOrg() + '. How are you? Got a few minutes?"';
  return '"Hi ' + fn + ', this is ' + pName() + ' from ' + pOrg() + '. I hope I\'m not catching you at a bad time. Do you have a few minutes?"';
}

// ===== RECOMMENDATIONS & ALERTS =====
function getRecommendation(p) {
  var ds = daysSince(effectiveLastContact(p));
  if (p.stage === 'Prospect') return 'Schedule introduction meeting';
  if (p.stage === 'Cultivate' && ds > 60) return 'OVERDUE \u2014 Re-engage now';
  if (p.stage === 'Cultivate') return 'Continue relationship building';
  if (p.stage === 'Solicit') return 'Prepare and schedule the ask';
  if (p.stage === 'Steward' && ds > 90) return 'Send impact update';
  if (p.stage === 'Steward') return 'Maintain stewardship cadence';
  return 'Review prospect status';
}

function getAlerts() {
  var alerts = [];
  var critDays = appSettings.alertThresholdCritical;
  var warnDays = appSettings.alertThresholdWarning;
  prospects.forEach(function(p) {
    var ds = daysSince(effectiveLastContact(p));
    if (ds >= critDays) alerts.push({ type: 'critical', prospect: p, msg: 'No contact in ' + ds + ' days' });
    else if (ds >= warnDays) alerts.push({ type: 'warning', prospect: p, msg: 'No contact in ' + ds + ' days' });
    if (p.stage === 'Cultivate' && ds >= 60 && ds < warnDays) alerts.push({ type: 'info', prospect: p, msg: 'Ready to advance? ' + ds + ' days since contact' });
    if (p.stage === 'Steward' && ds >= 120 && ds < critDays) alerts.push({ type: 'warning', prospect: p, msg: 'Stewardship overdue \u2014 ' + ds + ' days' });
    // Next Move overdue alerts
    if (p.nextAction && p.nextActionDate) {
      var nad = new Date(p.nextActionDate);
      if (!isNaN(nad.getTime()) && nad < new Date()) {
        var daysOver = Math.floor((Date.now() - nad.getTime()) / 86400000);
        alerts.push({ type: 'warning', prospect: p, msg: 'Next move overdue by ' + daysOver + ' days: ' + p.nextAction });
      }
    }
  });
  alerts.sort(function(a, b) {
    var order = { critical: 0, warning: 1, info: 2 };
    return (order[a.type] || 3) - (order[b.type] || 3);
  });
  return alerts;
}

function getCriticalCount() {
  return prospects.filter(function(p) { return daysSince(effectiveLastContact(p)) >= appSettings.alertThresholdCritical; }).length;
}

// ===== OUTREACH TEMPLATES (PERSONALIZED) =====
function generateOutreach(p, channel) {
  var ds = daysSince(effectiveLastContact(p));
  var dsText = ds < 999 ? ds + ' days ago' : 'unknown';
  var fn = p.firstName || 'there';
  var ln = p.lastName || '';
  var fullName = (fn + ' ' + ln).trim();
  var occ = p.occupation || 'professional';
  var pledge = fmt$(p.pledge);
  var lt = fmt$(p.lifetime);
  var stage = p.stage || 'Prospect';

  var eventMention = pEvent() ? '\n\nWe are hosting ' + pEvent() + (pEventDate() ? ' on ' + pEventDate() : ' soon') + ', and I would love for you to attend.' : '';
  var campaignMention = pCampaign() ? pCampaign() : 'our current initiative';
  var impactStory = pTalkingPt() ? pTalkingPt() : 'the incredible impact we are making in our community';
  var newsletterMention = pNewsletter() ? '\n\nQuick update: ' + pNewsletter() : '';

  var T = {
    Email: {
      Prospect: 'Subject: Introduction \u2014 ' + pOrg() + '\n\n' + toneGreet(fn) + '\n\nI hope this message finds you well. My name is ' + pName() + ' and I serve as ' + pTitle() + ' at ' + pOrg() + '. I came across your work as a ' + occ + ' and was truly impressed.\n\nI would love the opportunity to introduce you to ' + impactStory + '. We believe your expertise and passion could be a wonderful complement to our community of supporters.\n\nWould you be available for a brief coffee meeting or phone call in the coming weeks? I would love to learn more about what causes are close to your heart.' + eventMention + newsletterMention + '\n\n' + toneClose() + '\n' + pSig(),

      Cultivate: 'Subject: Exciting Update from ' + pOrg() + '\n\n' + toneGreet(fn) + '\n\nIt has been ' + dsText + ' since we last connected, and I wanted to share some exciting developments with you.\n\n' + impactStory + (p.lifetime > 0 ? ' Your generous lifetime support of ' + lt + ' has been part of making this possible.' : '') + '\n\nAs a valued member of our community, I would love to invite you to ' + (pEvent() ? pEvent() + (pEventDate() ? ' on ' + pEventDate() : '') : 'an upcoming event') + '. It would be a wonderful chance to see our impact firsthand.' + newsletterMention + '\n\nLooking forward to reconnecting.\n\n' + toneClose() + '\n' + pSig(),

      Solicit: 'Subject: A Transformative Opportunity \u2014 ' + campaignMention + '\n\n' + toneGreet(fn) + '\n\nOver the course of our relationship, I have been so grateful for your engagement with ' + pOrg() + (p.lifetime > 0 ? ' and your generous support totaling ' + lt : '') + '. Your belief in ' + pMission() + ' has been truly inspiring.\n\nToday, I am reaching out with an opportunity to make a transformative impact. ' + campaignMention + ' will directly advance ' + pMission() + '. ' + impactStory + '\n\nI would like to discuss a gift of ' + pledge + ' that would create measurable, lasting change. This level of investment would provide meaningful recognition and impact.\n\nCould we schedule a time to meet in person? I would love to share more details.' + eventMention + '\n\nWith gratitude,\n' + pSig(),

      Steward: 'Subject: Your Impact \u2014 A Personal Thank You\n\n' + toneGreet(fn) + '\n\nI wanted to take a moment to express our deepest gratitude for your ' + (p.lifetime > 0 ? 'generous lifetime giving of ' + lt : 'incredible support') + '. Donors like you are the reason ' + pOrg() + ' can advance ' + pMission() + '.\n\nHere is what your generosity has accomplished:\n\u2022 ' + impactStory + '\n\u2022 Continued support of programs that change lives\n\u2022 Strengthened our mission for the future' + eventMention + newsletterMention + '\n\nAlso, many of our strongest partnerships have grown through personal referrals. If you know anyone who might share your passion, I would welcome an introduction.\n\nWith heartfelt thanks,\n' + pSig()
    },

// ===== NAVIGATION =====
function navigate(page) {
  currentPage = page;
  $$('#nav a').forEach(function(a) { a.classList.toggle('active', a.dataset.page === page); });
  var titles = { dashboard:'Dashboard', prospects:'Prospects', pipeline:'Pipeline', top:'Top Prospects', outreach:'Outreach', settings:'Scoring Weights', appsettings:'Settings' };
  $('#page-title').textContent = titles[page] || page;
  render();
  updateAlertBadge();
}

function updateAlertBadge() {
  var c = getCriticalCount();
  var link = $('[data-page="dashboard"]');
  var existing = link.querySelector('.badge-count');
  if (existing) existing.remove();
  if (c > 0) link.appendChild(h('span', { className: 'badge-count' }, ['' + c]));
}

$$('#nav a').forEach(function(a) {
  a.addEventListener('click', function(e) {
    e.preventDefault();
    navigate(a.dataset.page);
    $('#sidebar').classList.remove('open');
  });
});

function getFilteredProspects() {
  var list = prospects.slice();
  if (searchTerm) {
    var term = searchTerm.toLowerCase();
    list = list.filter(function(p) {
      return (p.firstName + ' ' + p.lastName + ' ' + (p.occupation || '') + ' ' + (p.email || '') + ' ' + (p.stage || '')).toLowerCase().indexOf(term) !== -1;
    });
  }
  // Apply filters
  if (filters.stages.length > 0) list = list.filter(function(p) { return filters.stages.indexOf(p.stage) !== -1; });
  if (filters.scoreMin > 0 || filters.scoreMax < 100) list = list.filter(function(p) { return p.score >= filters.scoreMin && p.score <= filters.scoreMax; });
  if (filters.engagements.length > 0) list = list.filter(function(p) { return filters.engagements.indexOf(p.engagement || 'unknown') !== -1; });
  if (filters.contactRange !== 'any') {
    list = list.filter(function(p) {
      var ds = daysSince(effectiveLastContact(p));
      if (filters.contactRange === '30') return ds <= 30;
      if (filters.contactRange === '31-90') return ds >= 31 && ds <= 90;
      if (filters.contactRange === '91-180') return ds >= 91 && ds <= 180;
      if (filters.contactRange === '180+') return ds > 180;
      return true;
    });
  }
  list.sort(function(a, b) {
    var va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'recommendation') { va = getRecommendation(a); vb = getRecommendation(b); }
    if (sortCol === 'lastName') { va = (a.firstName + ' ' + a.lastName).toLowerCase(); vb = (b.firstName + ' ' + b.lastName).toLowerCase(); }
    if (sortCol === 'lastContact') { va = effectiveLastContact(a); vb = effectiveLastContact(b); va = va ? va.getTime() : 0; vb = vb ? vb.getTime() : 0; }
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return ((va || 0) - (vb || 0)) * sortDir;
  });
  return list;
}

function moveStage(p, dir) {
  var idx = STAGES.indexOf(p.stage) + dir;

      var q = outreachSearch.toLowerCase();
      filtered = filtered.filter(function(p) {

      ])
    ]));

    var text = generateOutreach(p, selCh);
    contentArea.appendChild(h('div', { className: 'outreach-content' }, [text]));
    contentArea.appendChild(h('div', { style: { display: 'flex', gap: '8px', marginTop: '16px' } }, [
      h('button', { className: 'btn-primary btn-sm', onClick: function() { copyText(text); } }, ['\uD83D\uDCCB Copy to Clipboard']),
      h('button', { className: 'btn-outline btn-sm', onClick: function() { exportProspectOutreach(p); } }, ['\uD83D\uDCE5 Export Outreach'])
    ]));
  }
  rebuildContent();
}

function copyText(text) {
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function() { toast('Copied to clipboard!'); }); }
  else { var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('Copied!'); }
}

function renderSettings(ct) {
  var card = h('div', { className: 'card' });
  card.appendChild(h('div', { className: 'card-header' }, [
    h('h2', {}, ['Scoring Factors']),

    ])
  ]));

  card.appendChild(h('p', { className: 'text-muted text-sm mb-16' }, ['Each factor is weighted 1\u201325. Higher = more influence on the prospect score. The bar below shows each factor\u2019s share of the total.']));

  // --- Percentage distribution bar ---
  var segColors = ['#4f46e5','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777','#ea580c','#65a30d','#0284c7'];

    {k:'pledge',l:'Pledge Amount',isCustom:false},
    {k:'lifetime',l:'Lifetime Giving',isCustom:false},
    {k:'recency',l:'Contact Recency',isCustom:false},
    {k:'engagement',l:'Engagement Level',isCustom:false}
  ];
  customWeights.forEach(function(cw) {
    allFactors.push({k:cw.key, l:cw.label, isCustom:true, cw:cw});
  });

  var pctBarWrap = h('div', { style: { marginBottom: '20px' } });
  var pctBar = h('div', { style: { display: 'flex', height: '32px', borderRadius: '8px', overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,.1)' } });
  var pctLegend = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px 16px', marginTop: '8px', fontSize: '12px' } });
  pctBarWrap.appendChild(pctBar);
  pctBarWrap.appendChild(pctLegend);
  card.appendChild(pctBarWrap);

  function updatePctBar() {
    var total = getTotalWeight();
    pctBar.innerHTML = '';
    pctLegend.innerHTML = '';
    allFactors.forEach(function(fac, i) {
      var val = fac.isCustom ? fac.cw.weight : weights[fac.k];
      var pct = total > 0 ? (val / total * 100) : 0;
      var col = segColors[i % segColors.length];
      var seg = document.createElement('div');
      seg.style.cssText = 'width:' + pct + '%;background:' + col + ';display:flex;align-items:center;justify-content:center;transition:width .25s ease;min-width:0;position:relative;overflow:hidden;';
      if (pct >= 8) {
        var segLabel = document.createElement('span');
        segLabel.style.cssText = 'color:#fff;font-size:11px;font-weight:700;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.3);';
        segLabel.textContent = Math.round(pct) + '%';
        seg.appendChild(segLabel);
      }
      seg.title = fac.l + ': ' + val + ' (' + pct.toFixed(1) + '%)';
      pctBar.appendChild(seg);
      // Legend dot
      var dot = document.createElement('span');
      dot.style.cssText = 'display:inline-flex;align-items:center;gap:4px;';
      var swatch = document.createElement('span');
      swatch.style.cssText = 'width:10px;height:10px;border-radius:2px;background:' + col + ';display:inline-block;flex-shrink:0;';
      dot.appendChild(swatch);
      dot.appendChild(document.createTextNode(fac.l + ' ' + Math.round(pct) + '%'));
      pctLegend.appendChild(dot);
    });
  }
  updatePctBar();

  // --- Factor slider rows ---
  allFactors.forEach(function(fac, fi) {
    var currentVal = fac.isCustom ? fac.cw.weight : weights[fac.k];
    var row = h('div', { className: 'weight-row' });
    var nameEl = h('div', { className: 'wr-name' }, [fac.l]);
    var col = segColors[fi % segColors.length];
    var swatch = document.createElement('span');
    swatch.style.cssText = 'width:10px;height:10px;border-radius:2px;background:' + col + ';display:inline-block;margin-right:6px;flex-shrink:0;';
    nameEl.insertBefore(swatch, nameEl.firstChild);
    if (fac.isCustom) {
      nameEl.appendChild(h('span', { className: 'wr-badge', style: { marginLeft: '8px' } }, ['custom']));
    }
    row.appendChild(nameEl);

    var valSpan = h('div', { className: 'wr-val' }, ['' + currentVal]);
    var slider = h('input', { type: 'range', min: '1', max: '25', value: '' + currentVal });
    slider.style.accentColor = col;
    slider.addEventListener('input', function() {
      var newVal = parseInt(this.value);
      if (newVal < 1) newVal = 1;
      if (newVal > 25) newVal = 25;
      this.value = newVal;
      if (fac.isCustom) fac.cw.weight = newVal;
      else weights[fac.k] = newVal;
      currentVal = newVal;
      valSpan.textContent = '' + newVal;
      rescoreAll(); saveState();
      updatePctBar();
    });
    row.appendChild(slider);
    row.appendChild(valSpan);

    if (fac.isCustom) {
      row.appendChild(h('button', { className: 'wr-delete', onClick: function() {
        if (confirm('Remove "' + fac.l + '" from scoring?')) {
          var idx = customWeights.indexOf(fac.cw);
          if (idx !== -1) customWeights.splice(idx, 1);
          rescoreAll(); saveState(); render(); toast('Removed ' + fac.l);
        }
      } }, ['\u2715']));
    }

    card.appendChild(row);
  });

  if (allFactors.length === 6 && customWeights.length === 0) {
    card.appendChild(h('div', { className: 'text-muted text-sm', style: { textAlign: 'center', padding: '12px 0', borderTop: '1px solid var(--gray-100)', marginTop: '8px' } }, [
      'Click "Add Factor" to create custom scoring criteria from your Excel data.'
    ]));
  }

  ct.appendChild(card);

  // Integrations
  var api = h('div', { className: 'card' });
  api.appendChild(h('div', { className: 'card-header' }, [h('h2', {}, ['Integrations'])]));
  var fg = h('div', { className: 'form-group' });
  fg.appendChild(h('label', {}, ['Zillow API Key (for future integration)']));
  fg.appendChild(h('input', { type: 'password', placeholder: 'Enter API key...' }));
  fg.appendChild(h('div', { className: 'text-sm text-muted mt-8' }, ['Stored in memory only. Cleared when you close the tab.']));
  api.appendChild(fg);
  ct.appendChild(api);

  // Privacy / Clear
  var dz = h('div', { className: 'card' });
  dz.appendChild(h('div', { className: 'card-header' }, [h('h2', {}, ['Data & Privacy'])]));
  dz.appendChild(h('p', { className: 'text-sm text-muted mb-16' }, ['ProspectPro saves data to your browser\'s local storage only. No data is sent to any server. You can clear everything at any time.']));
  dz.appendChild(h('div', { style: { display: 'flex', gap: '8px' } }, [
    h('button', { className: 'btn-danger btn-sm', onClick: function() {
      if (confirm('Are you sure you want to clear ALL prospect data? This cannot be undone.')) {
        prospects = []; nextId = 1; saveState(); toast('All data cleared'); render(); updateAlertBadge();
      }
    } }, ['\u26A0 Clear All Data']),
    h('button', { className: 'btn-outline btn-sm', onClick: clearSavedData }, ['\uD83D\uDDD1 Clear Saved Data & Reload'])
  ]));
  ct.appendChild(dz);
}

function showAddWeightModal() {
  closeModal();
  var overlay = h('div', { className: 'modal-overlay', onClick: function(e) { if (e.target === overlay) closeModal(); } });
  var modal = h('div', { className: 'modal', style: { maxWidth: '480px' } });
  modal.appendChild(h('div', { className: 'modal-header' }, [h('h2', {}, ['Add Custom Scoring Factor']), h('button', { className: 'modal-close', onClick: closeModal }, ['\u00D7'])]));

  var body = h('div', { className: 'modal-body' });
  var inputs = {};

  var fg1 = h('div', { className: 'form-group' });
  fg1.appendChild(h('label', {}, ['Factor Name *']));
  inputs.label = h('input', { type: 'text', placeholder: 'e.g., Giving Capacity, Board Score, Event Attendance' });
  fg1.appendChild(inputs.label);
  body.appendChild(fg1);

  var fg2 = h('div', { className: 'form-group' });
  fg2.appendChild(h('label', {}, ['Maximum Value (for normalization) *']));
  inputs.maxVal = h('input', { type: 'number', placeholder: 'e.g., 100, 1000000, 10', value: '100' });
  fg2.appendChild(inputs.maxVal);
  fg2.appendChild(h('div', { className: 'text-sm text-muted mt-8' }, ['Prospect values are normalized against this max to produce a 0-100 score.']));
  body.appendChild(fg2);

  var fg3 = h('div', { className: 'form-group' });
  fg3.appendChild(h('label', {}, ['Weight (1\u201325)']));
  inputs.weight = h('input', { type: 'number', placeholder: '10', value: '10', min: '1', max: '25' });
  fg3.appendChild(inputs.weight);
  body.appendChild(fg3);

  modal.appendChild(body);
  modal.appendChild(h('div', { className: 'modal-footer' }, [
    h('button', { className: 'btn-outline', onClick: closeModal }, ['Cancel']),
    h('button', { className: 'btn-primary', onClick: function() {
      var label = inputs.label.value.trim();
      if (!label) { toast('Factor name is required'); return; }
      var maxVal = parseFloat(inputs.maxVal.value) || 100;
      var w = Math.min(25, Math.max(1, parseInt(inputs.weight.value) || 1));
      var key = 'custom_' + label.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_');
      if (customWeights.some(function(cw) { return cw.key === key; })) {
        toast('A factor with that name already exists'); return;
      }
      customWeights.push({ key: key, label: label, weight: w, maxVal: maxVal });
      rescoreAll(); saveState(); closeModal();
      toast('Added "' + label + '" (' + w + ' pts)');
      render();
    } }, ['Add Factor'])
  ]));
  overlay.appendChild(modal);
  $('#modal-root').appendChild(overlay);
}

// ===== PROSPECT DETAIL MODAL =====
function openProspectDetail(id) {
  var p = prospects.find(function(pr) { return pr.id === id; });
  if (!p) return;
  var activeTab = 'overview';

  function build() {
    closeModal();
    var overlay = h('div', { className: 'modal-overlay', onClick: function(e) { if (e.target === overlay) closeModal(); } });
    var modal = h('div', { className: 'modal' });

    modal.appendChild(h('div', { className: 'modal-header' }, [
      h('h2', {}, [(p.firstName + ' ' + p.lastName).trim()]),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } }, [
        h('span', { className: 'stage-badge ' + stageClass(p.stage) }, [p.stage]),
        h('span', { className: 'score-badge ' + scoreClass(p.score) }, ['' + p.score]),
        h('button', { className: 'modal-close', onClick: closeModal }, ['\u00D7'])
      ])
    ]));

    var tabs = h('div', { className: 'tabs', style: { padding: '0 24px' } });
    ['overview','activity','outreach','edit'].forEach(function(t) {
      var label = t.charAt(0).toUpperCase() + t.slice(1);
      if (t === 'activity' && p.activityLog && p.activityLog.length > 0) label += ' (' + p.activityLog.length + ')';
      tabs.appendChild(h('button', { className: 'tab-btn' + (t === activeTab ? ' active' : ''), onClick: function() { activeTab = t; build(); } }, [label]));
    });
    modal.appendChild(tabs);

    var body = h('div', { className: 'modal-body' });

    if (activeTab === 'overview') {
      var elc = effectiveLastContact(p);
      var ds = daysSince(elc);
      var grid = h('div', { className: 'form-row mb-16' });
      var left = h('div');
      [['Email', p.email],['Phone', p.phone],['Address', p.address],['Last Contact', fmtDate(elc) + (ds < 999 ? ' (' + ds + ' days ago)' : '')]].forEach(function(r) {
        left.appendChild(h('div', { className: 'text-sm text-muted' }, [r[0]]));
        left.appendChild(h('div', { style: { fontWeight: '500', marginBottom: '8px' } }, [r[1] || '\u2014']));
      });
      grid.appendChild(left);
      var right = h('div');
      right.appendChild(h('div', { className: 'text-sm text-muted' }, ['Pledge Amount']));
      right.appendChild(h('div', { style: { fontWeight: '700', fontSize: '18px', color: 'var(--green)', marginBottom: '8px' } }, [fmt$(p.pledge)]));
      [['Lifetime Giving', fmt$(p.lifetime)],['Home Value', fmt$(p.homeValue)],['Est. Salary', fmt$(p.salary)]].forEach(function(r) {
        right.appendChild(h('div', { className: 'text-sm text-muted' }, [r[0]]));
        right.appendChild(h('div', { style: { fontWeight: '500', marginBottom: '8px' } }, [r[1]]));
      });
      grid.appendChild(right);
      body.appendChild(grid);

      // Score breakdown bar chart
      body.appendChild(h('h3', { style: { marginBottom: '8px', fontSize: '14px', fontWeight: '600' } }, ['Score Breakdown']));
      var chart = h('div', { className: 'bar-chart' });
      var labels = { homeValue:'Home Value', salary:'Salary', pledge:'Pledge', lifetime:'Lifetime', recency:'Recency', engagement:'Engagement' };
      var barColors = { homeValue:'var(--blue)', salary:'var(--indigo)', pledge:'var(--green)', lifetime:'var(--purple)', recency:'var(--amber)', engagement:'#ec4899' };
      var customBarColors = ['#06b6d4','#f43f5e','#8b5cf6','#14b8a6','#f59e0b','#6366f1'];
      customWeights.forEach(function(cw, ci) { labels[cw.key] = cw.label; barColors[cw.key] = customBarColors[ci % customBarColors.length]; });
      var tw = getTotalWeight() || 1;
      if (p.factors) {
        Object.keys(labels).forEach(function(k) {
          var w = weights[k] != null ? weights[k] : 0;
          if (w === 0 && !weights.hasOwnProperty(k)) {
            var cw = customWeights.find(function(c) { return c.key === k; });
            if (cw) w = cw.weight;
          }
          var contrib = (p.factors[k] || 0) * w / tw;
          chart.appendChild(h('div', { className: 'bar-row' }, [
            h('div', { className: 'bar-label' }, [labels[k]]),
            h('div', { className: 'bar-track' }, [h('div', { className: 'bar-fill', style: { width: Math.max(2, contrib) + '%', background: barColors[k] } }, [Math.round(p.factors[k] || 0) + ''])]),
            h('div', { className: 'bar-value' }, ['w:' + w])
          ]));
        });
      }
      body.appendChild(chart);

      // Stage selector
      body.appendChild(h('h3', { style: { margin: '16px 0 8px', fontSize: '14px', fontWeight: '600' } }, ['Pipeline Stage']));
      var sr = h('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
      STAGES.forEach(function(st) {
        sr.appendChild(h('button', { className: (p.stage === st ? 'btn-primary' : 'btn-outline') + ' btn-sm', onClick: function() {
          p.stage = st; toast('Moved to ' + st); saveState(); build(); render(); updateAlertBadge();
        } }, [st]));
      });
      body.appendChild(sr);

      if (p.notes) {
        body.appendChild(h('h3', { style: { margin: '16px 0 8px', fontSize: '14px', fontWeight: '600' } }, ['Notes']));
        body.appendChild(h('div', { className: 'text-sm', style: { background: 'var(--gray-50)', padding: '12px', borderRadius: '6px' } }, [p.notes]));
      }

      body.appendChild(h('h3', { style: { margin: '16px 0 8px', fontSize: '14px', fontWeight: '600' } }, ['Recommendation']));
      var rec = getRecommendation(p);
      body.appendChild(h('div', { style: { padding: '12px', borderRadius: '6px', fontWeight: '600', fontSize: '13px', background: rec.indexOf('OVERDUE') !== -1 ? 'var(--red-light)' : 'var(--blue-light)', color: rec.indexOf('OVERDUE') !== -1 ? 'var(--red)' : 'var(--blue)' } }, [rec]));

    } else if (activeTab === 'activity') {
      // === ACTIVITY LOG TAB ===
      if (!p.activityLog) p.activityLog = [];
      // Add entry form
      var addForm = h('div', { className: 'card', style: { padding: '16px', marginBottom: '16px' } });
      addForm.appendChild(h('h3', { style: { fontSize: '14px', fontWeight: '600', marginBottom: '12px' } }, ['Log New Activity']));
      var aInputs = {};
      var afRow1 = h('div', { className: 'form-row' });
      var afg1 = h('div', { className: 'form-group' });
      afg1.appendChild(h('label', {}, ['Type *']));
      aInputs.type = h('select');
      ['Call','Email','Meeting','Note','Gift','Other'].forEach(function(t) { aInputs.type.appendChild(h('option', { value: t }, [t])); });
      afg1.appendChild(aInputs.type);
      afRow1.appendChild(afg1);

      afRow1.appendChild(afg2);
      addForm.appendChild(afRow1);
      var afg3 = h('div', { className: 'form-group' });
      afg3.appendChild(h('label', {}, ['Summary *']));
      aInputs.summary = h('input', { type: 'text', placeholder: 'What happened?' });
      afg3.appendChild(aInputs.summary);
      addForm.appendChild(afg3);
      var afRow2 = h('div', { className: 'form-row' });
      var afg4 = h('div', { className: 'form-group' });
      afg4.appendChild(h('label', {}, ['Outcome']));
      aInputs.outcome = h('select');
      ['Positive','Neutral','Negative','Pending'].forEach(function(o) { aInputs.outcome.appendChild(h('option', { value: o }, [o])); });
      afg4.appendChild(aInputs.outcome);
      afRow2.appendChild(afg4);
      var afg5 = h('div', { className: 'form-group' });
      afg5.appendChild(h('label', {}, ['Next Step (optional)']));
      aInputs.nextStep = h('input', { type: 'text', placeholder: 'e.g., Follow up next Tuesday' });
      afg5.appendChild(aInputs.nextStep);
      afRow2.appendChild(afg5);
      addForm.appendChild(afRow2);
      addForm.appendChild(h('button', { className: 'btn-primary btn-sm', onClick: function() {
        var summary = aInputs.summary.value.trim();
        if (!summary) { toast('Summary is required'); return; }
        var nextLogId = p.activityLog.length > 0 ? Math.max.apply(null, p.activityLog.map(function(e) { return e.id || 0; })) + 1 : 1;
        p.activityLog.push({
          id: nextLogId,
          date: aInputs.date.value || new Date().toISOString().slice(0, 10),
          type: aInputs.type.value,
          summary: summary,
          outcome: aInputs.outcome.value,
          nextStep: aInputs.nextStep.value.trim()
        });
        scoreProspect(p); saveState();

      } }, ['\u2795 Log Activity']));

window.showImportModal = function() {
  closeModal();
  var overlay = h('div', { className: 'modal-overlay', onClick: function(e) { if (e.target === overlay) closeModal(); } });
  var modal = h('div', { className: 'modal' });
  modal.appendChild(h('div', { className: 'modal-header' }, [h('h2', {}, ['Import Prospect Data']), h('button', { className: 'modal-close', onClick: closeModal }, ['\u00D7'])]));

  var body = h('div', { className: 'modal-body' });
  var dropZone = h('div', { className: 'drop-zone' }, [
    h('div', { className: 'dz-icon' }, ['\uD83D\uDCC1']),
    h('div', { className: 'dz-text' }, ['Drag & drop your file here']),
    h('div', { className: 'dz-sub' }, ['Supports .xlsx, .xls, .csv, .tsv'])
  ]);
  var fileInput = h('input', { type: 'file', accept: '.xlsx,.xls,.csv,.tsv', style: { display: 'none' } });
  dropZone.appendChild(fileInput);
  dropZone.addEventListener('click', function() { fileInput.click(); });
  dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
  dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', function() { if (this.files[0]) handleFile(this.files[0]); });
  body.appendChild(dropZone);

  var mappingArea = h('div', { className: 'hidden' });
  body.appendChild(mappingArea);
  modal.appendChild(body);
  overlay.appendChild(modal);
  $('#modal-root').appendChild(overlay);

  var parsedRows = [], parsedHeaders = [];

  var fieldDefs = [
    {k:'firstName',l:'First Name',req:true,kw:['first name','first','fname','first_name']},
    {k:'lastName',l:'Last Name',req:true,kw:['last name','last','lname','surname','last_name']},
    {k:'address',l:'Address',kw:['address','street','mailing']},
    {k:'occupation',l:'Occupation',kw:['occupation','job','title','position']},
    {k:'phone',l:'Phone',kw:['phone','cell','mobile','tel']},
    {k:'email',l:'Email',kw:['email','e-mail','e_mail']},
    {k:'lastContact',l:'Last Contact Date',kw:['last contact','contact date','last_contact','contactdate']},
    {k:'pledge',l:'Pledge Amount',kw:['pledge','gift amount','donation','gift_amount']},
    {k:'lifetime',l:'Lifetime Giving',kw:['lifetime','total giving','cumulative','lifetime_giving']},
    {k:'homeValue',l:'Home Value',kw:['home value','zillow','property value','net worth','home_value','networth']},
    {k:'salary',l:'Salary / Income',kw:['salary','income','compensation']},
    {k:'stage',l:'Pipeline Stage',kw:['stage','pipeline','status']},
    {k:'notes',l:'Notes',kw:['notes','comments','remarks']},
    {k:'engagement',l:'Engagement Level',kw:['engagement','interest level','interest']}
  ];

  function autoDetect(header) {
    var hh = header.toLowerCase().replace(/[_\-]/g, ' ').trim();
    for (var i = 0; i < fieldDefs.length; i++) {
      for (var j = 0; j < fieldDefs[i].kw.length; j++) {
        if (hh === fieldDefs[i].kw[j] || hh.indexOf(fieldDefs[i].kw[j]) !== -1) return fieldDefs[i].k;
      }
    }
    return '';
  }

  function handleFile(file) {
    var ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'csv' || ext === 'tsv') {
      Papa.parse(file, { header: true, skipEmptyLines: true, complete: function(r) { parsedHeaders = r.meta.fields || []; parsedRows = r.data; showMapping(); } });
    } else {
      var reader = new FileReader();
      reader.onload = function(e) {
        var wb = XLSX.read(e.target.result, { type: 'array' });
        var json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
        if (json.length > 0) { parsedHeaders = Object.keys(json[0]); parsedRows = json; showMapping(); }
        else toast('No data found');
      };
      reader.readAsArrayBuffer(file);
    }
  }

  function showMapping() {
    dropZone.classList.add('hidden');
    mappingArea.classList.remove('hidden');
    mappingArea.innerHTML = '';
    mappingArea.appendChild(h('h3', { style: { marginBottom: '4px' } }, ['Column Mapping']));
    mappingArea.appendChild(h('p', { className: 'text-sm text-muted mb-16' }, ['Found ' + parsedRows.length + ' rows. Map your columns:']));

    var grid = h('div', { className: 'mapping-grid' });
    var selects = {};
    parsedHeaders.forEach(function(hdr) {
      grid.appendChild(h('label', {}, [hdr]));
      grid.appendChild(h('div', { className: 'arrow' }, ['\u2192']));
      var sel = h('select');
      sel.appendChild(h('option', { value: '' }, ['-- Skip --']));
      fieldDefs.forEach(function(f) { sel.appendChild(h('option', { value: f.k }, [f.l + (f.req ? ' *' : '')])); });
      if (customWeights.length > 0) {
        sel.appendChild(h('option', { value: '', disabled: 'disabled' }, ['\u2500\u2500 Custom Factors \u2500\u2500']));
        customWeights.forEach(function(cw) { sel.appendChild(h('option', { value: cw.key }, ['\u2605 ' + cw.label])); });
      }
      sel.value = autoDetect(hdr);
      selects[hdr] = sel;
      grid.appendChild(sel);
    });
    mappingArea.appendChild(grid);
    mappingArea.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', marginTop: '16px' } }, [
      h('button', { className: 'btn-outline btn-sm', onClick: function() { dropZone.classList.remove('hidden'); mappingArea.classList.add('hidden'); } }, ['\u25C0 Back']),
      h('button', { className: 'btn-primary', onClick: function() {
        var mapping = {};
        parsedHeaders.forEach(function(hdr) { if (selects[hdr].value) mapping[hdr] = selects[hdr].value; });
        var vals = Object.keys(mapping).map(function(k) { return mapping[k]; });
        if (vals.indexOf('firstName') === -1 || vals.indexOf('lastName') === -1) { toast('First Name and Last Name are required'); return; }
        importRows(parsedRows, mapping);
        closeModal();
      } }, ['Import ' + parsedRows.length + ' Prospects'])
    ]));
  }
};

function importRows(rows, mapping) {
  var rev = {};
  Object.keys(mapping).forEach(function(hdr) { rev[mapping[hdr]] = hdr; });
  var count = 0;
  rows.forEach(function(row) {
    var fn = (row[rev.firstName] || '').toString().trim();
    var ln = (row[rev.lastName] || '').toString().trim();
    if (!fn && !ln) return;
    var p = {
      id: nextId++, firstName: fn, lastName: ln,
      email: (row[rev.email] || '').toString().trim(),
      phone: (row[rev.phone] || '').toString().trim(),
      address: (row[rev.address] || '').toString().trim(),
      occupation: (row[rev.occupation] || '').toString().trim(),
      pledge: parseNum(row[rev.pledge]),
      lifetime: parseNum(row[rev.lifetime]),
      homeValue: parseNum(row[rev.homeValue]),
      salary: parseNum(row[rev.salary]),
      lastContact: parseDate(row[rev.lastContact]),
      stage: parseStage(row[rev.stage]),
      notes: (row[rev.notes] || '').toString().trim(),
      engagement: parseEng(row[rev.engagement]),
      score: 0, factors: {}, activityLog: [], nextAction: '', nextActionDate: '', targetAskAmount: 0
    };
    p.customData = {};
    customWeights.forEach(function(cw) {
      if (rev[cw.key]) p.customData[cw.key] = parseNum(row[rev[cw.key]]);
    });
    if (!p.salary && p.occupation) p.salary = estimateSalary(p.occupation);
    scoreProspect(p);
    prospects.push(p);
    count++;
  });
  toast('Imported ' + count + ' prospects!');
  saveState(); render(); updateAlertBadge();
}

function parseNum(v) { if (v == null || v === '') return 0; var n = parseFloat(String(v).replace(/[^0-9.\-]/g, '')); return isNaN(n) ? 0 : n; }
function parseDate(v) {
  if (!v) return null;
  if (typeof v === 'number' && v > 10000 && v < 100000) return new Date((v - 25569) * 86400000);
  var d = new Date(v); return isNaN(d.getTime()) ? null : d;
}
function parseStage(v) {
  if (!v) return 'Prospect';
  var s = v.toString().trim().toLowerCase();
  for (var i = 0; i < STAGES.length; i++) { if (s.indexOf(STAGES[i].toLowerCase()) !== -1) return STAGES[i]; }
  return 'Prospect';
}
function parseEng(v) {
  if (!v) return 'unknown';
  var s = v.toString().trim().toLowerCase();
  if (s === 'high' || s === 'h') return 'high';
  if (s === 'medium' || s === 'med' || s === 'm') return 'medium';
  if (s === 'low' || s === 'l') return 'low';
  return 'unknown';
}

window.exportFullReport = function() {
  if (prospects.length === 0) { toast('No data to export'); return; }
  var wb = XLSX.utils.book_new();
  var sorted = prospects.slice().sort(function(a, b) { return b.score - a.score; });

  var s1 = sorted.map(function(p, i) {
    return { Rank: i+1, Score: p.score, 'First Name': p.firstName, 'Last Name': p.lastName,
      Email: p.email, Phone: p.phone, Address: p.address, Occupation: p.occupation,
      Stage: p.stage, Pledge: p.pledge, 'Lifetime Giving': p.lifetime,
      'Home Value': p.homeValue, 'Est. Salary': p.salary,
      'Last Contact': p.lastContact ? fmtDate(p.lastContact) : '',
      'Days Since Contact': daysSince(effectiveLastContact(p)) < 999 ? daysSince(effectiveLastContact(p)) : '',
      Engagement: p.engagement, Notes: p.notes
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s1), 'All Prospects Ranked');

  var s2 = sorted.map(function(p) {
    var ds = daysSince(effectiveLastContact(p));
    return { Name: (p.firstName+' '+p.lastName).trim(), Score: p.score, Stage: p.stage,
      Urgency: ds >= 180 ? 'Critical' : ds >= 90 ? 'High' : 'Normal',
      'Days Since Contact': ds < 999 ? ds : 'Unknown',
      Recommendation: getRecommendation(p),
      'Suggested Channel': p.stage === 'Solicit' ? 'Phone' : 'Email'
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s2), 'Action Items');

  var s3 = sorted.slice(0, 20).map(function(p) {
    return { Name: (p.firstName+' '+p.lastName).trim(), Score: p.score, Stage: p.stage,
      'Email Draft': generateOutreach(p, 'Email'),
      'Phone Script': generateOutreach(p, 'Phone'),
      'LinkedIn Message': generateOutreach(p, 'LinkedIn')
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s3), 'Outreach Drafts');

  var s4 = STAGES.map(function(st) {
    var sp = prospects.filter(function(p) { return p.stage === st; });
    return { Stage: st, Count: sp.length,
      'Avg Score': sp.length ? Math.round(sp.reduce(function(s,p){return s+p.score;},0)/sp.length) : 0,
      'Total Pledged': sp.reduce(function(s,p){return s+(p.pledge||0);},0)
    };
  });
  s4.push({ Stage: 'TOTAL', Count: prospects.length,
    'Avg Score': prospects.length ? Math.round(prospects.reduce(function(s,p){return s+p.score;},0)/prospects.length) : 0,
    'Total Pledged': prospects.reduce(function(s,p){return s+(p.pledge||0);},0)
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s4), 'Pipeline Summary');

  var s5 = [
    {Factor:'Home Value',Weight:weights.homeValue},{Factor:'Estimated Salary',Weight:weights.salary},
    {Factor:'Pledge Amount',Weight:weights.pledge},{Factor:'Lifetime Giving',Weight:weights.lifetime},
    {Factor:'Contact Recency',Weight:weights.recency},{Factor:'Engagement Level',Weight:weights.engagement}
  ];
  customWeights.forEach(function(cw) { s5.push({ Factor: cw.label + ' (custom)', Weight: cw.weight }); });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s5), 'Scoring Weights');

  XLSX.writeFile(wb, 'ProspectPro_Full_Report.xlsx');
  toast('Full report exported!');
};
