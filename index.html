$('#chatbot-toggle').addEventListener('click', window.toggleChat);
$('#chat-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') window.sendChat(); });

function addBotMsg(text, suggestions) {
  var msgs = $('#chat-messages');
  var msg = h('div', { className: 'chat-msg bot' });
  msg.textContent = text;
  if (suggestions && suggestions.length) {
    var row = h('div', { className: 'chat-suggestions' });
    suggestions.forEach(function(s) {
      var chip = h('span', {}, [s]);
      chip.addEventListener('click', function() { $('#chat-input').value = s; window.sendChat(); });
      row.appendChild(chip);
    });
    msg.appendChild(row);
  }
  msgs.appendChild(msg);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMsg(text) {
  var msgs = $('#chat-messages');
  msgs.appendChild(h('div', { className: 'chat-msg user' }, [text]));
  msgs.scrollTop = msgs.scrollHeight;
}

function addBotAction(text, label, action) {
  var msgs = $('#chat-messages');
  var msg = h('div', { className: 'chat-msg bot' });
  msg.appendChild(document.createTextNode(text));
  if (label && action) {
    var btn = h('span', { className: 'chat-action' }, [label]);
    btn.addEventListener('click', action);
    msg.appendChild(h('br'));
    msg.appendChild(btn);
  }
  msgs.appendChild(msg);
  msgs.scrollTop = msgs.scrollHeight;
}

window.sendChat = function() {
  var input = $('#chat-input');
  var q = input.value.trim();
  if (!q) return;
  addUserMsg(q);
  input.value = '';
  setTimeout(function() { processChat(q); }, 200);
};

function processChat(q) {
  var lower = q.toLowerCase();
  if (prospects.length === 0 && !/help|what\s*can|import|upload|add|hi|hello|hey|good|setting|theme|go\s*to|show|open|navigate|profile/.test(lower)) {
    addBotMsg('You don\'t have any prospects loaded yet. Import data or add prospects first!', ['Import data', 'Add a prospect']);
    return;
  }

  // === NAVIGATION ===
  if (/\b(go\s*to|show|open|navigate|take\s*me)\b.*\b(dashboard|home)\b/.test(lower)) { navigate('dashboard'); addBotMsg('Here\'s your dashboard.'); return; }
  if (/\b(go\s*to|show|open|navigate|take\s*me)\b.*\b(prospect|list|all)\b/.test(lower) && !/pipeline/.test(lower) && !/top/.test(lower)) { navigate('prospects'); addBotMsg('Here\'s your full prospect list.'); return; }
  if (/\b(go\s*to|show|open|navigate|take\s*me)\b.*\b(pipeline|kanban|board)\b/.test(lower)) { navigate('pipeline'); addBotMsg('Here\'s your pipeline board.'); return; }
  if (/\b(go\s*to|show|open|navigate|take\s*me)\b.*\b(top|rank|best)\b/.test(lower)) { navigate('top'); addBotMsg('Here are your top-ranked prospects.'); return; }
  if (/\b(go\s*to|show|open|navigate|take\s*me)\b.*\b(outreach|email|template|draft)\b/.test(lower)) { navigate('outreach'); addBotMsg('Here\'s the outreach page. Use the search bar to find specific prospects.'); return; }
  if (/\b(go\s*to|show|open|navigate|take\s*me)\b.*\b(scor|weight)\b/.test(lower)) { navigate('settings'); addBotMsg('Here are your scoring weight settings.'); return; }
  if (/\b(go\s*to|show|open|navigate|take\s*me)\b.*\b(setting|theme|config|preferences|profile)\b/.test(lower)) { navigate('appsettings'); addBotMsg('Here are your app settings. You can update your profile, theme, and outreach personalization here.'); return; }

  // === PROFILE SETUP ===
  if (/profile|personali|my\s*info|my\s*name|my\s*org|signature|talking\s*point|impact\s*stor|tone|campaign/.test(lower)) {
    var hasProfile = profile.name && profile.orgName;
    if (hasProfile) {
      addBotAction('Your profile is set up:\n\nName: ' + profile.name + '\nTitle: ' + profile.title + '\nOrg: ' + profile.orgName + '\nTone: ' + profile.tone + '\nTalking points: ' + profile.talkingPoints.length + '\n\nYou can update it anytime in Settings.', 'Edit Profile \u2192', function() { navigate('appsettings'); });
    } else {
      addBotAction('Set up your profile in Settings to personalize all outreach templates with your name, organization, talking points, and more.', 'Go to Settings \u2192', function() { navigate('appsettings'); });
    }
    return;
  }

  // === COMPARE PROSPECTS ===
  if (/compare|vs\b|versus|side.by.side|difference\s*between/.test(lower)) {
    var names = lower.replace(/compare|vs|versus|and|between|side.by.side|difference|the|prospects?/gi, '').trim().split(/\s{2,}|\s*,\s*|\s+and\s+|\s+vs\.?\s+|\s+to\s+/);
    names = names.map(function(n) { return n.trim(); }).filter(function(n) { return n.length > 1; });
    if (names.length < 2) { addBotMsg('Name two prospects to compare. Try: "Compare John Smith vs Jane Doe"'); return; }
    var p1 = prospects.find(function(p) { return (p.firstName + ' ' + p.lastName).toLowerCase().indexOf(names[0]) !== -1; });
    var p2 = prospects.find(function(p) { return (p.firstName + ' ' + p.lastName).toLowerCase().indexOf(names[1]) !== -1; });
    if (!p1) { addBotMsg('Couldn\'t find "' + names[0] + '" in your prospects.'); return; }
    if (!p2) { addBotMsg('Couldn\'t find "' + names[1] + '" in your prospects.'); return; }
    var msg = 'Comparison: ' + p1.firstName + ' vs ' + p2.firstName + '\n\n';
    msg += 'Score: ' + p1.score + ' vs ' + p2.score + (p1.score > p2.score ? ' \u2190 higher' : p2.score > p1.score ? ' \u2192 higher' : ' (tied)') + '\n';
    msg += 'Stage: ' + p1.stage + ' vs ' + p2.stage + '\n';
    msg += 'Pledge: ' + fmt$(p1.pledge) + ' vs ' + fmt$(p2.pledge) + '\n';
    msg += 'Lifetime: ' + fmt$(p1.lifetime) + ' vs ' + fmt$(p2.lifetime) + '\n';
    msg += 'Last Contact: ' + daysSince(p1.lastContact) + 'd vs ' + daysSince(p2.lastContact) + 'd ago\n\n';
    var winner = p1.score >= p2.score ? p1 : p2;
    msg += 'Recommendation: Prioritize ' + winner.firstName + ' ' + winner.lastName + ' (higher score). ';
    if (daysSince(winner.lastContact) > 60) msg += 'But note: they\'re overdue for contact.';
    addBotMsg(msg);
    return;
  }

  // === FILTER QUERIES ===
  if (/\b(over|above|more\s*than|greater|exceeds?|at\s*least)\b.*\b(\$?\d[\d,]*)\b/.test(lower) || /\b(\$?\d[\d,]*)\b.*\b(or\s*more|plus|\+)\b/.test(lower)) {
    var amtMatch = lower.match(/\$?([\d,]+)/);
    var amt = amtMatch ? parseInt(amtMatch[1].replace(/,/g, '')) : 0;
    if (amt === 0) { addBotMsg('What amount are you filtering by?'); return; }
    var field = 'pledge';
    if (/score/.test(lower)) field = 'score';
    else if (/lifetime|giving|total/.test(lower)) field = 'lifetime';
    else if (/home|property|value/.test(lower)) field = 'homeValue';
    else if (/salary|income/.test(lower)) field = 'salary';
    var filtered = prospects.filter(function(p) { return (p[field] || 0) >= amt; }).sort(function(a, b) { return (b[field] || 0) - (a[field] || 0); });
    var fieldLabel = { pledge: 'pledge', lifetime: 'lifetime giving', homeValue: 'home value', salary: 'salary', score: 'score' }[field];
    if (filtered.length === 0) { addBotMsg('No prospects with ' + fieldLabel + ' of ' + (field === 'score' ? amt : fmt$(amt)) + ' or more.'); return; }
    var list = filtered.slice(0, 8).map(function(p) { return '\u2022 ' + p.firstName + ' ' + p.lastName + ': ' + (field === 'score' ? p[field] : fmt$(p[field])); }).join('\n');
    addBotMsg(filtered.length + ' prospect' + (filtered.length !== 1 ? 's' : '') + ' with ' + fieldLabel + ' of ' + (field === 'score' ? amt + '+' : fmt$(amt) + '+') + ':\n' + list);
    return;
  }

  // === STRATEGY / ADVICE ===
  if (/\b(strateg|advice|suggest|recommend|what\s*should|next\s*step|approach|prioriti|focus)\b/.test(lower)) {
    if (prospects.length === 0) { addBotMsg('Import prospects first, then I can give strategic advice.'); return; }
    var byStage = {};
    STAGES.forEach(function(st) { byStage[st] = prospects.filter(function(p) { return p.stage === st; }); });
    var alerts = getAlerts();
    var msg = 'Strategic Recommendations:\n\n';
    if (alerts.filter(function(a) { return a.type === 'critical'; }).length > 0) {
      msg += '1. URGENT: You have ' + alerts.filter(function(a) { return a.type === 'critical'; }).length + ' prospects with no contact in ' + appSettings.alertThresholdCritical + '+ days. These relationships are at risk of going cold. Reach out this week.\n\n';
    }
    if (byStage.Solicit.length > 0) {
      var topSolicit = byStage.Solicit.sort(function(a, b) { return b.score - a.score; })[0];
      msg += '2. ASK READY: ' + byStage.Solicit.length + ' prospect' + (byStage.Solicit.length !== 1 ? 's' : '') + ' in Solicit stage. Top target: ' + topSolicit.firstName + ' ' + topSolicit.lastName + ' (Score: ' + topSolicit.score + ', Pledge: ' + fmt$(topSolicit.pledge) + '). Schedule the meeting.\n\n';
    }
    if (byStage.Cultivate.length > 0) {
      var stale = byStage.Cultivate.filter(function(p) { return daysSince(effectiveLastContact(p)) > 60; });
      if (stale.length > 0) msg += '3. PIPELINE: ' + stale.length + ' Cultivate prospects are overdue (60+ days). Re-engage before they cool off.\n\n';
      else msg += '3. PIPELINE: Your ' + byStage.Cultivate.length + ' Cultivate prospects are on track. Keep building those relationships.\n\n';
    }
    if (byStage.Prospect.length > 0) {
      msg += '4. NEW LEADS: ' + byStage.Prospect.length + ' prospects need introductions. Focus on high-scorers first.\n\n';
    }
    if (byStage.Steward.length > 0) {
      msg += '5. STEWARDSHIP: Don\'t forget your ' + byStage.Steward.length + ' steward-stage donors. Impact updates and referral asks keep the relationship strong.';
    }
    // Revenue opportunity
    var potentialRev = prospects.filter(function(p) { return p.stage === 'Solicit' || p.stage === 'Cultivate'; }).reduce(function(s, p) { return s + (p.pledge || 0); }, 0);
    if (potentialRev > 0) msg += '\n\n\uD83D\uDCB0 Pipeline revenue potential: ' + fmt$(potentialRev) + ' in active stages.';
    addBotMsg(msg.trim());
    return;
  }

  // === PROSPECT PROFILE / TELL ME ABOUT ===
  if (/\b(tell\s*me\s*about|profile|details?\s*(on|for|about)|info\s*(on|about|for)|what\s*do\s*(you|we)\s*know|brief\s*me)\b/.test(lower)) {
    var nameQ = lower.replace(/tell\s*me\s*about|profile|details?\s*(on|for|about)?|info\s*(on|about|for)?|what\s*do\s*(you|we)\s*know\s*(about)?|brief\s*me\s*(on)?|the|prospect/gi, '').trim();
    if (nameQ.length < 2) { addBotMsg('Who would you like to know about? Give me a name.'); return; }
    var match = prospects.find(function(p) { return (p.firstName + ' ' + p.lastName).toLowerCase().indexOf(nameQ) !== -1; });
    if (!match) { addBotMsg('I couldn\'t find anyone matching "' + nameQ + '".'); return; }
    var ds = daysSince(match.lastContact);
    var msg = match.firstName + ' ' + match.lastName + ' \u2014 Full Profile\n\n';
    msg += 'Occupation: ' + (match.occupation || 'Unknown') + '\n';
    msg += 'Stage: ' + match.stage + ' | Score: ' + match.score + '/100\n';
    msg += 'Pledge: ' + fmt$(match.pledge) + ' | Lifetime: ' + fmt$(match.lifetime) + '\n';
    msg += 'Home Value: ' + fmt$(match.homeValue) + ' | Salary: ' + fmt$(match.salary) + '\n';
    msg += 'Engagement: ' + (match.engagement || 'unknown') + '\n';
    msg += 'Last Contact: ' + fmtDate(match.lastContact) + (ds < 999 ? ' (' + ds + ' days ago)' : '') + '\n';
    if (match.email) msg += 'Email: ' + match.email + '\n';
    if (match.phone) msg += 'Phone: ' + match.phone + '\n';
    msg += '\nRecommendation: ' + getRecommendation(match) + '\n';
    if (match.score >= 70) msg += '\nInsight: High-priority prospect. Their score puts them in the top tier \u2014 invest time here.';
    else if (match.score >= 40) msg += '\nInsight: Mid-range prospect. Look for ways to deepen engagement and move them up the pipeline.';
    else msg += '\nInsight: Lower-scoring prospect. May need more research or qualification before heavy investment.';
    if (ds > 90 && ds < 999) msg += ' WARNING: Contact is overdue (' + ds + ' days).';
    addBotAction(msg, 'View Full Details \u2192', function() { openProspectDetail(match.id); });
    return;
  }

  // === AVERAGE / AGGREGATE ===
  if (/\b(average|avg|mean|median)\b/.test(lower)) {
    if (prospects.length === 0) { addBotMsg('No data to analyze yet.'); return; }
    var avgScore = Math.round(prospects.reduce(function(s, p) { return s + p.score; }, 0) / prospects.length);
    var avgPledge = Math.round(prospects.reduce(function(s, p) { return s + (p.pledge || 0); }, 0) / prospects.length);
    var avgLifetime = Math.round(prospects.reduce(function(s, p) { return s + (p.lifetime || 0); }, 0) / prospects.length);
    var avgDays = prospects.filter(function(p) { return daysSince(effectiveLastContact(p)) < 999; });
    var avgContact = avgDays.length > 0 ? Math.round(avgDays.reduce(function(s, p) { return s + daysSince(effectiveLastContact(p)); }, 0) / avgDays.length) : 'N/A';
    addBotMsg('Portfolio Averages:\n\n' +
      '\u2022 Average score: ' + avgScore + '/100\n' +
      '\u2022 Average pledge: ' + fmt$(avgPledge) + '\n' +
      '\u2022 Average lifetime giving: ' + fmt$(avgLifetime) + '\n' +
      '\u2022 Average days since contact: ' + avgContact + (typeof avgContact === 'number' && avgContact > 60 ? ' (concerning \u2014 consider outreach blitz)' : ''));
    return;
  }

  // === WHO HAS THE HIGHEST/LOWEST ===
  if (/\b(who\s*(has|have)\s*(the\s*)?(highest|biggest|largest|most|lowest|smallest|least))\b/.test(lower) || /\b(biggest|largest|highest|most|lowest)\s*(pledge|gift|giving|score|salary|home|value)\b/.test(lower)) {
    var isLowest = /lowest|smallest|least/.test(lower);
    var field = 'score';
    if (/pledge|gift|donation/.test(lower)) field = 'pledge';
    else if (/lifetime|giving|total/.test(lower)) field = 'lifetime';
    else if (/home|property|value/.test(lower)) field = 'homeValue';
    else if (/salary|income/.test(lower)) field = 'salary';
    var sorted = prospects.slice().sort(function(a, b) { return isLowest ? (a[field] || 0) - (b[field] || 0) : (b[field] || 0) - (a[field] || 0); });
    var top3 = sorted.slice(0, 3);
    var label = { score: 'score', pledge: 'pledge', lifetime: 'lifetime giving', homeValue: 'home value', salary: 'salary' }[field];
    var list = top3.map(function(p, i) { return (i + 1) + '. ' + p.firstName + ' ' + p.lastName + ': ' + (field === 'score' ? p[field] : fmt$(p[field])); }).join('\n');
    addBotMsg((isLowest ? 'Lowest' : 'Highest') + ' ' + label + ':\n' + list);
    return;
  }

  // === PIPELINE DISTRIBUTION ===
  if (/\b(pipeline|breakdown|distribution|stage)\b/.test(lower) && /\b(breakdown|distribution|how\s*many|show|what)\b/.test(lower)) {
    var msg = 'Pipeline Distribution:\n\n';
    var total = prospects.length || 1;
    STAGES.forEach(function(st) {
      var sp = prospects.filter(function(p) { return p.stage === st; });
      var pct = Math.round(sp.length / total * 100);
      var bar = '';
      for (var i = 0; i < Math.round(pct / 5); i++) bar += '\u2588';
      msg += st + ': ' + sp.length + ' (' + pct + '%) ' + bar + '\n';
      msg += '  Pledged: ' + fmt$(sp.reduce(function(s, p) { return s + (p.pledge || 0); }, 0)) + ' | Avg score: ' + (sp.length ? Math.round(sp.reduce(function(s, p) { return s + p.score; }, 0) / sp.length) : 0) + '\n';
    });
    addBotAction(msg, 'View Pipeline \u2192', function() { navigate('pipeline'); });
    return;
  }

  // === COUNT / HOW MANY ===
  if (/how\s*many|total|count/.test(lower)) {
    var stageMatch = null;
    STAGES.forEach(function(st) { if (lower.indexOf(st.toLowerCase()) !== -1) stageMatch = st; });
    if (stageMatch) {
      var sp = prospects.filter(function(p) { return p.stage === stageMatch; });
      var msg = sp.length + ' prospect' + (sp.length !== 1 ? 's' : '') + ' in ' + stageMatch + '.';
      if (sp.length > 0) msg += ' Total pledged: ' + fmt$(sp.reduce(function(s, p) { return s + (p.pledge || 0); }, 0)) + '.';
      addBotMsg(msg);
      return;
    }
    addBotMsg('You have ' + prospects.length + ' prospects:\n' + STAGES.map(function(st) {
      return '\u2022 ' + st + ': ' + prospects.filter(function(p) { return p.stage === st; }).length;
    }).join('\n'));
    return;
  }

  // === TOP / BEST / RANK ===
  if (/\btop\b|best|highest\s*scor|rank/.test(lower)) {
    var num = 5;
    var numMatch = lower.match(/\d+/);
    if (numMatch) num = Math.min(parseInt(numMatch[0]), 20);
    var sorted = prospects.slice().sort(function(a, b) { return b.score - a.score; }).slice(0, num);
    if (sorted.length === 0) { addBotMsg('No prospects yet.'); return; }
    var list = sorted.map(function(p, i) { return (i + 1) + '. ' + p.firstName + ' ' + p.lastName + ' (Score: ' + p.score + ', ' + p.stage + ', Pledge: ' + fmt$(p.pledge) + ')'; }).join('\n');
    addBotAction('Top ' + sorted.length + ':\n' + list, 'View Rankings \u2192', function() { navigate('top'); });
    return;
  }

  // === FOLLOW-UP / OVERDUE / ALERTS ===
  if (/follow.?up|overdue|alert|attention|need|urgent|critical|stale|cold|risk/.test(lower)) {
    var alerts = getAlerts();
    if (alerts.length === 0) { addBotMsg('All clear! Everyone is within your contact thresholds. Nice work!'); return; }
    var critical = alerts.filter(function(a) { return a.type === 'critical'; });
    var warning = alerts.filter(function(a) { return a.type === 'warning'; });
    var info = alerts.filter(function(a) { return a.type === 'info'; });
    var msg = alerts.length + ' action items:\n\n';
    if (critical.length) {
      msg += 'CRITICAL (' + critical.length + '):\n';
      critical.slice(0, 3).forEach(function(a) { msg += '\u2022 ' + a.prospect.firstName + ' ' + a.prospect.lastName + ' \u2014 ' + a.msg + '\n'; });
      if (critical.length > 3) msg += '  ...and ' + (critical.length - 3) + ' more\n';
      msg += '\n';
    }
    if (warning.length) {
      msg += 'WARNINGS (' + warning.length + '):\n';
      warning.slice(0, 3).forEach(function(a) { msg += '\u2022 ' + a.prospect.firstName + ' ' + a.prospect.lastName + ' \u2014 ' + a.msg + '\n'; });
      if (warning.length > 3) msg += '  ...and ' + (warning.length - 3) + ' more\n';
      msg += '\n';
    }
    if (info.length) {
      msg += 'OPPORTUNITIES (' + info.length + '):\n';
      info.slice(0, 2).forEach(function(a) { msg += '\u2022 ' + a.prospect.firstName + ' ' + a.prospect.lastName + ' \u2014 ' + a.msg + '\n'; });
    }
    addBotAction(msg.trim(), 'View Dashboard \u2192', function() { navigate('dashboard'); });
    return;
  }

  // === FIND / SEARCH ===
  if (/find|search|look\s*up|where\s*is|who\s*is|locate/.test(lower)) {
    var searchQ = lower.replace(/find|search|look\s*up|where\s*is|who\s*is|locate|for|me|the|a|prospect|person|donor/gi, '').trim();
    if (searchQ.length < 2) { addBotMsg('Who are you looking for? Give me a name or occupation.'); return; }
    var matches = prospects.filter(function(p) {
      return (p.firstName + ' ' + p.lastName + ' ' + (p.occupation || '') + ' ' + (p.email || '')).toLowerCase().indexOf(searchQ) !== -1;
    });
    if (matches.length === 0) { addBotMsg('No prospects matching "' + searchQ + '". Try a different name or occupation.'); return; }
    if (matches.length === 1) {
      var m = matches[0];
      var ds = daysSince(m.lastContact);
      addBotAction(m.firstName + ' ' + m.lastName + '\nScore: ' + m.score + ' | Stage: ' + m.stage + ' | Pledge: ' + fmt$(m.pledge) + '\nLast contact: ' + (ds < 999 ? ds + ' days ago' : 'unknown') + '\nRecommendation: ' + getRecommendation(m),
        'View Details \u2192', function() { openProspectDetail(m.id); });
    } else {
      var list = matches.slice(0, 8).map(function(p) { return '\u2022 ' + p.firstName + ' ' + p.lastName + ' (' + p.score + ', ' + p.stage + ', ' + (p.occupation || 'N/A') + ')'; }).join('\n');
      addBotMsg('Found ' + matches.length + ' match' + (matches.length !== 1 ? 'es' : '') + ':\n' + list);
    }
    return;
  }

  // === MOVE / ADVANCE ===
  if (/move|advance|promote|change\s*stage/.test(lower)) {
    var nameStr = lower.replace(/move|advance|promote|change\s*stage|to|the|stage|please/gi, '').trim();
    var targetStage = null;
    STAGES.forEach(function(st) { if (nameStr.indexOf(st.toLowerCase()) !== -1) { targetStage = st; nameStr = nameStr.replace(st.toLowerCase(), '').trim(); } });
    if (!nameStr) { addBotMsg('Which prospect? Try: "Move John Smith to Solicit"'); return; }
    var found = prospects.find(function(p) { return (p.firstName + ' ' + p.lastName).toLowerCase().indexOf(nameStr) !== -1; });
    if (!found) { addBotMsg('I couldn\'t find "' + nameStr + '".'); return; }
    if (targetStage) {
      found.stage = targetStage; scoreProspect(found); saveState(); render(); updateAlertBadge();
      addBotMsg('Done! Moved ' + found.firstName + ' ' + found.lastName + ' to ' + targetStage + '. ' + getRecommendation(found));
    } else {
      var idx = STAGES.indexOf(found.stage);
      if (idx < STAGES.length - 1) {
        found.stage = STAGES[idx + 1]; saveState(); render(); updateAlertBadge();
        addBotMsg('Advanced ' + found.firstName + ' to ' + found.stage + '. Next action: ' + getRecommendation(found));
      } else { addBotMsg(found.firstName + ' is already at Steward (final stage). Focus on impact updates and referral asks.'); }
    }
    return;
  }

  // === DRAFT OUTREACH ===
  if (/\b(draft|write|compose|create)\s*(an?\s*)?(email|phone|linkedin|outreach|message|script)\b/.test(lower) || /\b(email|call|message)\s*(draft|template)?\s*(for|to|about)\b/.test(lower)) {
    var channel = 'Email';
    if (/phone|call|script/.test(lower)) channel = 'Phone';
    else if (/linkedin/.test(lower)) channel = 'LinkedIn';
    var nameQ = lower.replace(/draft|write|compose|create|an?|email|phone|linkedin|outreach|message|script|call|template|for|to|about/gi, '').trim();
    if (nameQ.length < 2) { addBotMsg('Who should I draft outreach for? Try: "Draft email for John Smith"'); return; }
    var match = prospects.find(function(p) { return (p.firstName + ' ' + p.lastName).toLowerCase().indexOf(nameQ) !== -1; });
    if (!match) { addBotMsg('I couldn\'t find "' + nameQ + '". Try a different name.'); return; }
    var text = generateOutreach(match, channel);
    addBotAction(channel + ' draft for ' + match.firstName + ' ' + match.lastName + ' (' + match.stage + '):\n\n' + text.substring(0, 300) + '...', 'Copy Full Draft', function() { copyText(text); });
    return;
  }

  // === STATS / SUMMARY ===
  if (/stats|summary|overview|portfolio|pledged|giving|snapshot/.test(lower)) {
    var totalPledged = prospects.reduce(function(s, p) { return s + (p.pledge || 0); }, 0);
    var totalLifetime = prospects.reduce(function(s, p) { return s + (p.lifetime || 0); }, 0);
    var avgScore = Math.round(prospects.reduce(function(s, p) { return s + p.score; }, 0) / prospects.length);
    var topScorer = prospects.slice().sort(function(a, b) { return b.score - a.score; })[0];
    var msg = 'Portfolio Snapshot:\n\n';
    msg += '\u2022 ' + prospects.length + ' prospects\n';
    msg += '\u2022 ' + fmt$(totalPledged) + ' total pledged\n';
    msg += '\u2022 ' + fmt$(totalLifetime) + ' lifetime giving\n';
    msg += '\u2022 Average score: ' + avgScore + '/100\n';
    msg += '\u2022 Top prospect: ' + topScorer.firstName + ' ' + topScorer.lastName + ' (' + topScorer.score + ')\n\n';
    var overdue = prospects.filter(function(p) { return daysSince(effectiveLastContact(p)) > 90; }).length;
    if (overdue > 0) msg += '\u26A0 ' + overdue + ' prospect' + (overdue !== 1 ? 's' : '') + ' overdue for contact.\n';
    var highEngagement = prospects.filter(function(p) { return p.engagement === 'high'; }).length;
    msg += '\u2705 ' + highEngagement + ' high-engagement prospects.';
    addBotMsg(msg);
    return;
  }

  // === IMPORT / ADD ===
  if (/import|upload/.test(lower)) { addBotAction('Ready to import data!', 'Open Import \u2192', function() { window.showImportModal(); }); return; }
  if (/add\s*(a\s*)?(new\s*)?prospect|new\s*prospect|create\s*prospect/.test(lower)) { addBotAction('Let\'s add a new prospect.', 'Open Add Form \u2192', function() { window.showAddProspectModal(); }); return; }

  // === EXPORT ===
  if (/export|download|report|excel|spreadsheet/.test(lower)) { addBotAction('I\'ll generate a full multi-sheet Excel report.', 'Export Report \u2192', function() { window.exportFullReport(); }); return; }

  // === ENGAGEMENT ANALYSIS ===
  if (/engag|interest|involved|active|inactive|cold/.test(lower)) {
    var high = prospects.filter(function(p) { return p.engagement === 'high'; });
    var med = prospects.filter(function(p) { return p.engagement === 'medium'; });
    var low = prospects.filter(function(p) { return p.engagement === 'low'; });
    var unk = prospects.filter(function(p) { return !p.engagement || p.engagement === 'unknown'; });
    var msg = 'Engagement Breakdown:\n\n';
    msg += '\u2022 High engagement: ' + high.length + (high.length > 0 ? ' \u2014 ' + high.slice(0, 3).map(function(p) { return p.firstName; }).join(', ') : '') + '\n';
    msg += '\u2022 Medium: ' + med.length + '\n';
    msg += '\u2022 Low: ' + low.length + (low.length > 0 ? ' \u2014 consider re-engagement campaign' : '') + '\n';
    msg += '\u2022 Unknown: ' + unk.length + (unk.length > 0 ? ' \u2014 update these profiles' : '') + '\n\n';
    if (low.length > 0 || unk.length > 0) msg += 'Tip: Low/unknown engagement prospects drag down your portfolio. Consider a targeted outreach campaign or qualifying call.';
    else msg += 'Your engagement data looks solid!';
    addBotMsg(msg);
    return;
  }

  // === WEALTH ANALYSIS ===
  if (/wealth|rich|high.?net.?worth|afflu|capacity|major\s*gift/.test(lower)) {
    var wealthy = prospects.slice().sort(function(a, b) { return ((b.homeValue || 0) + (b.salary || 0)) - ((a.homeValue || 0) + (a.salary || 0)); }).slice(0, 5);
    if (wealthy.length === 0) { addBotMsg('No wealth data available.'); return; }
    var msg = 'Top Wealth Signals:\n\n';
    wealthy.forEach(function(p, i) {
      msg += (i + 1) + '. ' + p.firstName + ' ' + p.lastName + '\n';
      msg += '   Home: ' + fmt$(p.homeValue) + ' | Salary: ' + fmt$(p.salary) + ' | Pledge: ' + fmt$(p.pledge) + '\n';
    });
    msg += '\nThese prospects have the highest capacity indicators. Consider them for major gift conversations.';
    addBotMsg(msg);
    return;
  }

  // === WHAT SHOULD I DO TODAY ===
  if (/\b(today|this\s*week|what.*do|action\s*plan|to.?do|priorities|priority)\b/.test(lower)) {
    var msg = 'Your Priority Actions:\n\n';
    var actionNum = 1;
    var crit = prospects.filter(function(p) { return daysSince(effectiveLastContact(p)) >= appSettings.alertThresholdCritical; }).sort(function(a, b) { return b.score - a.score; });
    if (crit.length > 0) { msg += actionNum++ + '. CONTACT NOW: ' + crit[0].firstName + ' ' + crit[0].lastName + ' (' + daysSince(crit[0].lastContact) + ' days silent, Score: ' + crit[0].score + ')\n'; }
    var solicits = prospects.filter(function(p) { return p.stage === 'Solicit'; }).sort(function(a, b) { return b.pledge - a.pledge; });
    if (solicits.length > 0) { msg += actionNum++ + '. SCHEDULE ASK: ' + solicits[0].firstName + ' ' + solicits[0].lastName + ' for ' + fmt$(solicits[0].pledge) + '\n'; }
    var cultOverdue = prospects.filter(function(p) { return p.stage === 'Cultivate' && daysSince(effectiveLastContact(p)) > 60; }).sort(function(a, b) { return b.score - a.score; });
    if (cultOverdue.length > 0) { msg += actionNum++ + '. RE-ENGAGE: ' + cultOverdue[0].firstName + ' ' + cultOverdue[0].lastName + ' (Cultivate, ' + daysSince(cultOverdue[0].lastContact) + ' days)\n'; }
    var newProspects = prospects.filter(function(p) { return p.stage === 'Prospect'; }).sort(function(a, b) { return b.score - a.score; });
    if (newProspects.length > 0) { msg += actionNum++ + '. INTRODUCE: ' + newProspects[0].firstName + ' ' + newProspects[0].lastName + ' (highest-scoring new prospect)\n'; }
    var stewOverdue = prospects.filter(function(p) { return p.stage === 'Steward' && daysSince(effectiveLastContact(p)) > 90; });
    if (stewOverdue.length > 0) { msg += actionNum++ + '. THANK: Send impact update to ' + stewOverdue.length + ' steward prospect' + (stewOverdue.length !== 1 ? 's' : '') + '\n'; }
    if (actionNum === 1) msg += 'Everything looks great! Your pipeline is healthy and contacts are up to date.';
    addBotMsg(msg.trim());
    return;
  }

  // === THEME ===
  if (/\b(theme|color|rebrand|brand)\b/.test(lower)) {
    addBotAction('You can customize the app colors in Settings.', 'Open Settings \u2192', function() { navigate('appsettings'); });
    return;
  }

  // === HELP ===
  if (/help|what\s*can|commands|how\s*do|options|features/.test(lower)) {
    addBotMsg("Here's what I can do:\n\n" +
      "Navigate: \"Go to pipeline\", \"Open outreach\"\n" +
      "Search: \"Find John Smith\", \"Search CEO\"\n" +
      "Analyze: \"Show stats\", \"Average pledge\", \"Wealth analysis\"\n" +
      "Filter: \"Prospects over $50K pledge\", \"Score above 70\"\n" +
      "Compare: \"Compare John vs Jane\"\n" +
      "Draft: \"Draft email for Jane Doe\"\n" +
      "Manage: \"Move Jane to Solicit\", \"Advance John\"\n" +
      "Strategy: \"What should I do today?\", \"Give me advice\"\n" +
      "Reports: \"Export report\", \"Pipeline breakdown\"\n" +
      "Profile: \"Update my profile\", \"Set up personalization\"\n" +
      "Engage: \"Who needs follow-up?\", \"Engagement analysis\"", [
      'What should I do today?',
      'Show stats',
      'Who needs follow-up?',
      'Wealth analysis',
      'Set up my profile'
    ]);
    return;
  }

  // === GREETING ===
  if (/^(hi|hello|hey|good\s*(morning|afternoon|evening)|what'?s\s*up|yo)\b/.test(lower)) {
    var greeting = prospects.length > 0 ?
      'Hey! You have ' + prospects.length + ' prospects loaded. What would you like to work on?' :
      'Hey! Ready to get started? Import your prospect data or add prospects manually.';
    addBotMsg(greeting, prospects.length > 0 ? ['What should I do today?', 'Show stats', 'Who needs follow-up?'] : ['Import data', 'Add a prospect', 'Help']);
    return;
  }

  // === THANKS ===
  if (/\b(thanks?|thank\s*you|thx|appreciate|great|perfect|awesome|nice)\b/.test(lower)) {
    addBotMsg('Happy to help! What else can I do for you?', ['Show stats', 'Who needs follow-up?', 'What should I do today?']);
    return;
  }

  // === FALLBACK ===
  addBotMsg("I didn't quite catch that. Here are some things I understand:", [
    'What should I do today?',
    'Show top prospects',
    'Find a prospect',
    'Draft email for...',
    'Pipeline breakdown',
    'Help'
  ]);
}

// ===== INIT =====
var hadSavedData = loadState();
if (currentTheme !== 'default') applyTheme(currentTheme);
render();
updateAlertBadge();
if (hadSavedData) toast('Data restored from local storage');

})();
</script>
</body>
</html>
